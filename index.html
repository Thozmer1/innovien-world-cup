<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Innovien World Cup — Standings</title>
<style>
  :root{
    --green:#B0DD66; --green-dk:#8fbf3f; --gray:#747777; --gray-lt:#eef0ef;
    --ink:#2b2e2b; --alert:#E74C3C; --card:#ffffff; --line:#e4e7e3;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#f6f8f4;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.45}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 20px 60px}
  header.top{border-left:6px solid var(--green);padding:6px 0 6px 16px;margin-bottom:6px}
  h1{margin:0;font-size:26px;letter-spacing:-.01em}
  .sub{color:var(--gray);font-size:14px;margin-top:4px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 22px}
  .chip{background:var(--gray-lt);color:var(--gray);font-size:12px;font-weight:600;
    padding:5px 11px;border-radius:999px}
  .chip.live{background:var(--green);color:#2b3b13}
  .leader{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px 20px;margin-bottom:22px;border-left:6px solid var(--green)}
  .leader .crown{font-size:30px}
  .leader .lbl{color:var(--gray);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
  .leader .nm{font-size:20px;font-weight:700}
  .leader .pts{margin-left:auto;text-align:right}
  .leader .pts b{font-size:30px;color:var(--green-dk)}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);
    border-radius:14px;overflow:hidden}
  th,td{padding:9px 12px;text-align:right;font-size:14px;border-bottom:1px solid var(--line)}
  th{background:#fbfcfa;color:var(--gray);font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  th.l,td.l{text-align:left}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:nth-child(-n+3) td{background:#fbfdf6}
  td.rank{color:var(--gray);font-weight:700;width:34px}
  td.nm{font-weight:600}
  td.cum b{font-size:15px}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.04em}
  .badge.AM{background:#e7f3d2;color:#5d7a26}
  .badge.REC{background:var(--gray-lt);color:var(--gray)}
  .day-pos{color:var(--green-dk);font-weight:700}
  .day-zero{color:#c2c6bf}
  .muted{color:#c2c6bf}
  section.block{margin-top:26px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin:0 0 10px}
  .movers{display:flex;flex-wrap:wrap;gap:8px}
  .mover{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:13px}
  .mover b{color:var(--green-dk)}
  .alert{background:#fff;border:1px solid #f3cfca;border-left:6px solid var(--alert);border-radius:12px;padding:14px 18px}
  .alert .hd{color:var(--alert);font-weight:700;font-size:14px;margin-bottom:4px}
  .alert p{margin:6px 0;font-size:13.5px}
  .manual{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 18px}
  .manual div{padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .manual div:last-child{border-bottom:none}
  .manual span.pt{color:var(--gray);font-weight:700}
  footer{margin-top:30px;color:var(--gray);font-size:12px;border-top:1px solid var(--line);padding-top:16px}
  footer b{color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Innovien World Cup — Standings</h1>
    <div class="sub" id="sub"></div>
  </header>
  <div class="chips" id="chips"></div>

  <div class="leader" id="leader"></div>

  <table>
    <thead>
      <tr>
        <th class="l">#</th><th class="l">Name</th><th class="l">Role</th>
        <th>Mtgs</th><th>Scr</th><th>Sub</th><th>Start</th>
        <th id="dayhdr">Latest day</th><th>Cumulative</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <section class="block"><h2>Movers (latest activity)</h2><div class="movers" id="movers"></div></section>
  <section class="block"><h2>⚠ Account Breaker — needs leadership confirmation</h2><div class="alert" id="breaker"></div></section>
  <section class="block"><h2>⚠ Manual entry still needed</h2><div class="manual" id="manual"></div></section>

  <footer id="footer"></footer>
</div>

<script>
  const D = JSON.parse(document.getElementById('standings-data').textContent.replace('/*DATA_START*/','').replace('/*DATA_END*/',''));
  const $ = id => document.getElementById(id);
  $('sub').textContent = D.contest_window + ' · "six weeks, one trophy"';
  $('chips').innerHTML =
    `<span class="chip live">Through ${D.window_end}</span>`+
    `<span class="chip">Refreshed ${D.refreshed}</span>`+
    `<span class="chip">${D.power_week}</span>`+
    `<span class="chip">Auto-tracked points only</span>`;
  $('dayhdr').textContent = D.day_label;
  $('leader').innerHTML =
    `<div class="crown">🏆</div><div><div class="lbl">Current leader</div>`+
    `<div class="nm">${D.leader.name} <span class="badge ${D.leader.role}">${D.leader.role}</span></div></div>`+
    `<div class="pts"><div class="lbl">Cumulative</div><b>${D.leader.cum.toLocaleString()}</b></div>`;
  const dash = v => v ? v : '<span class="muted">–</span>';
  $('rows').innerHTML = D.rows.map(r=>{
    const day = r.day>0 ? `<span class="day-pos">+${r.day}</span>` : `<span class="day-zero">0</span>`;
    return `<tr><td class="rank l">${r.rank}</td><td class="nm l">${r.name}</td>`+
      `<td class="l"><span class="badge ${r.role}">${r.role}</span></td>`+
      `<td>${dash(r.mtg)}</td><td>${dash(r.scr)}</td><td>${dash(r.sub)}</td><td>${dash(r.start)}</td>`+
      `<td>${day}</td><td class="cum"><b>${r.cum.toLocaleString()}</b></td></tr>`;
  }).join('');
  $('movers').innerHTML = D.movers.map(m=>`<div class="mover">${m.name} <b>+${m.pts}</b></div>`).join('') || '<span class="muted">No new activity.</span>';
  $('breaker').innerHTML = `<div class="hd">Big potential swing</div><p>${D.breaker.headline}</p>`+(D.breaker.detail?`<p>${D.breaker.detail}</p>`:'');
  $('manual').innerHTML = D.manual.map(m=>`<div>${m.item} <span class="pt">${m.pts}</span><br><span class="muted">${m.why}</span></div>`).join('');
  $('footer').innerHTML = D.footer;
</script>
</body>
</html>
